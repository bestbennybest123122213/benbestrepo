name: Weekly Domain Health Capture

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug mailbox stats aggregation
        env:
          SMARTLEAD_API_KEY: ${{ secrets.SMARTLEAD_API_KEY }}
        run: |
          node -e "
          const API_KEY = process.env.SMARTLEAD_API_KEY;
          const BASE = 'https://server.smartlead.ai/api/v1';
          (async () => {
            // Get campaigns
            const res = await fetch(BASE + '/campaigns/?api_key=' + API_KEY);
            const campaigns = await res.json();
            const active = campaigns.filter(c => ['ACTIVE','COMPLETED','PAUSED','STOPPED'].includes(c.status));
            console.log('Campaigns to process:', active.length);

            // Aggregate mailbox stats by domain
            const domainStats = {};
            let processed = 0;
            for (const c of active) {
              try {
                const r = await fetch(BASE+'/campaigns/'+c.id+'/mailbox-statistics?api_key='+API_KEY);
                const d = await r.json();
                const stats = d?.data || d || [];
                if (Array.isArray(stats)) {
                  for (const s of stats) {
                    if (!s.from_email) continue;
                    const domain = s.from_email.split('@')[1];
                    if (!domainStats[domain]) domainStats[domain] = {sent:0, replies:0};
                    domainStats[domain].sent += parseInt(s.sent_count)||0;
                    domainStats[domain].replies += parseInt(s.reply_count)||0;
                  }
                }
              } catch(e) {}
              processed++;
              if (processed % 10 === 0) console.log('Processed', processed, '/', active.length);
              await new Promise(r=>setTimeout(r,200));
            }

            // Show top 10 domains
            const sorted = Object.entries(domainStats).sort((a,b) => b[1].sent - a[1].sent);
            console.log('\nTop 10 domains by sends:');
            sorted.slice(0,10).forEach(([d,s]) => console.log('  '+d+': '+s.sent+' sent, '+s.replies+' replies'));
            console.log('\nTotal domains with data:', sorted.filter(([d,s]) => s.sent > 0).length);
            console.log('Total sends:', sorted.reduce((sum,[d,s]) => sum+s.sent, 0));

            // Check proitss specifically
            const proitss = domainStats['proitss-imannntv.com'];
            console.log('\nproitss-imannntv.com:', proitss || 'NOT FOUND');
          })().catch(e => { console.error(e); process.exit(1); });
          "
